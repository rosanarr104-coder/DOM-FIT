<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>

<body>
    <main>

        <div class="div-1">
            <h1>Crie sua conta</h1>
            <p>Cadastre-se para acessar nossa plataforma e aproveitar todos os recursos disponiveis</p>

        </div>



        <div class="container">
            <h2>Cadastro</h2>

            <form action="">
                <div input-group>
                    <input type="Nome" placeholder="Nome" required>


                </div>


                <div class="input-group">
                    <input type="Sobrenome" placeholder="Sobrenome" required>

                </div>

                <div class="input-group">
                    <input type="Email" placeholder="Email" required>

                </div>

                <div class="input-group">
                    <input type="Usuário" placeholder="Usuário" required>

                </div>

                <div class="input-group">
                    <input type="Senha" placeholder="Senha" required>

                </div>

                <div class="input-group">
                    <input type="Confirma senha" placeholder="Confirma senha" required>

                </div>
                <input type="submit" class="btn" value="Criar conta">
                <label for="Já tenho uma conta">Já tenho uma conta</label>
            </form>

        </div>

    </main>

</body>

</html>
