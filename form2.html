<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="form2.css">
</head>

<body>
    <main>




        <div class="container">


            <div class="div-1">
                <h1>Crie sua conta</h1>
                <p>Cadastre-se para acessar nossa plataforma e aproveitar todos os recursos disponiveis</p>

            </div>



            <div class="div-2">
                <h2>Cadastro</h2>

                <form>
                    <div class="input">
                        <div class="input-group">
                            <input type="text" placeholder="Nome">
                        </div>


                        <div class="input-group">
                            <input type="Sobrenome" placeholder="Sobrenome">

                        </div>

                        <div class="input-group">
                            <input type="Email" placeholder="Email">

                        </div>

                        <div class="input-group">
                            <input type="Usuário" placeholder="Usuário">

                        </div>

                        <div class="input-group">
                            <input type="Senha" placeholder="Senha">

                        </div>

                        <div class="input-group">
                            <input type="Confirma senha" placeholder="Confirma senha">

                        </div>

                        <button class="btn">Criar conta</button>
                </form>

                <div class="links">
                    <a href="form.html">Já tenho uma conta</a>
                </div>



            </div>

        </div>

        </div>
    </main>

</body>

</html>
